<!DOCTYPE html>
<html lang="fr" x-data="shopApp()" :dir="lang === 'ar' ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Shop | Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Montserrat', sans-serif; background: #0b0f1a; color: white; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gradient-gold { background: linear-gradient(135deg, #d4af37 0%, #f9e29a 50%, #b8860b 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 card-glass border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-luxury tracking-widest gradient-gold bg-clip-text text-transparent italic">PRESTIGE</div>
        <div class="flex items-center gap-6">
            <select x-model="lang" class="bg-transparent border-none text-sm font-bold cursor-pointer outline-none">
                <option value="fr">FR</option>
                <option value="ar">AR</option>
            </select>
            <button @click="cartOpen = true" class="relative p-2 hover:text-yellow-500 transition">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="absolute -top-1 -right-1 bg-yellow-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold" x-text="cart.length"></span>
            </button>
            <button @click="loginModal = true" class="text-[10px] opacity-30 hover:opacity-100 uppercase tracking-tighter" x-show="!isLoggedIn">Admin</button>
            <button @click="isLoggedIn = false" class="text-[10px] text-red-500 uppercase tracking-tighter" x-show="isLoggedIn">Déconnexion</button>
        </div>
    </nav>

    <div x-show="loginModal" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90">
        <div class="card-glass p-8 rounded-3xl w-full max-w-sm border border-yellow-600/30">
            <h2 class="text-2xl font-luxury text-yellow-500 mb-6 text-center">Connexion Admin</h2>
            <div class="space-y-4">
                <input type="text" x-model="loginForm.user" placeholder="Utilisateur" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-yellow-500">
                <input type="password" x-model="loginForm.pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-yellow-500">
                <button @click="handleLogin" class="w-full gradient-gold text-black font-bold py-4 rounded-xl">Se connecter</button>
                <button @click="loginModal = false" class="w-full text-xs text-gray-500">Annuler</button>
            </div>
        </div>
    </div>

    <section x-show="isLoggedIn" x-cloak class="m-6 p-8 border-2 border-dashed border-yellow-600/30 rounded-3xl bg-yellow-600/5 shadow-2xl">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-yellow-500">🛠 Gestion du Catalogue</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-4">
                <input type="text" x-model="newProd.name" placeholder="Nom du produit" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white outline-none">
                <input type="file" @change="handleFileUpload" class="text-xs">
            </div>
            <div class="col-span-2">
                <p class="text-[10px] text-gray-400 mb-4 uppercase tracking-widest">Les prix seront réglés sur 30, 40 et 60 DH par défaut.</p>
                <button @click="addProduct" class="w-full gradient-gold text-black font-extrabold py-4 rounded-xl hover:opacity-90">AJOUTER LE PRODUIT</button>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <template x-for="(product, index) in products" :key="index">
                <div class="card-glass rounded-[2rem] overflow-hidden group">
                    <div class="h-80 overflow-hidden relative">
                        <img :src="product.image" class="w-full h-full object-cover">
                        <button x-show="isLoggedIn" @click="products.splice(index, 1)" class="absolute top-4 right-4 bg-red-600 p-2 rounded-full text-white hover:bg-red-700">Supprimer</button>
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-bold mb-4" x-text="product.name"></h3>
                        <div class="flex gap-2 mb-6">
                            <template x-for="opt in volumes">
                                <button @click="product.selectedSize = opt.size; product.currentPrice = opt.price"
                                    :class="product.selectedSize === opt.size ? 'gradient-gold text-black' : 'bg-white/5 border-white/10'"
                                    class="flex-1 py-2 rounded-lg font-bold text-[10px]" x-text="opt.size"></button>
                            </template>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl text-yellow-500 font-bold"><span x-text="product.currentPrice"></span> DH</span>
                            <button @click="addToCart(product)" class="gradient-gold text-black px-6 py-3 rounded-xl font-bold text-[10px] uppercase">Commander</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[100]">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-md bg-[#0b0f1a] shadow-2xl flex flex-col">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-2xl font-luxury text-yellow-500">Panier</h2>
                <button @click="cartOpen = false" class="text-4xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-4 text-sm">
                <template x-for="(item, idx) in cart">
                    <div class="flex items-center gap-4 bg-white/5 p-3 rounded-xl">
                        <img :src="item.image" class="w-12 h-12 rounded object-cover">
                        <div class="flex-1">
                            <p class="font-bold" x-text="item.name"></p>
                            <p class="text-xs text-gray-500" x-text="item.size"></p>
                        </div>
                        <span class="text-yellow-500 font-bold" x-text="item.price + ' DH'"></span>
                    </div>
                </template>
            </div>
            <div class="p-8 bg-white/5 border-t border-white/10">
                <div class="flex justify-between text-2xl mb-6"><span>Total</span><span class="text-yellow-500 font-bold"><span x-text="getTotal()"></span> DH</span></div>
                <button @click="sendWhatsApp()" class="w-full bg-[#25D366] py-5 rounded-2xl font-bold text-lg">WhatsApp Order</button>
            </div>
        </div>
    </div>

    <script>
        function shopApp() {
            return {
                lang: 'fr',
                loginModal: false,
                isLoggedIn: false,
                loginForm: { user: '', pass: '' },
                adminCredentials: { user: 'admin', pass: '1234' }, // <-- CHANGEZ ICI
                cartOpen: false,
                adminOpen: false,
                cart: [],
                volumes: [
                    { size: '20ml', price: 30 },
                    { size: '30ml', price: 40 },
                    { size: '50ml', price: 60 }
                ],
                newProd: { name: '', image: 'https://via.placeholder.com/400' },
                products: [
                    { name: "Musc Blanc", selectedSize: '20ml', currentPrice: 30, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=500" }
                ],
                handleLogin() {
                    if(this.loginForm.user === this.adminCredentials.user && this.loginForm.pass === this.adminCredentials.pass) {
                        this.isLoggedIn = true;
                        this.loginModal = false;
                        this.loginForm = { user: '', pass: '' };
                    } else {
                        alert("Accès refusé !");
                    }
                },
                handleFileUpload(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (f) => { this.newProd.image = f.target.result; };
                        reader.readAsDataURL(file);
                    }
                },
                addProduct() {
                    if(this.newProd.name) {
                        this.products.push({
                            name: this.newProd.name,
                            selectedSize: '20ml',
                            currentPrice: 30,
                            image: this.newProd.image
                        });
                        this.newProd = { name: '', image: 'https://via.placeholder.com/400' };
                    }
                },
                addToCart(p) { this.cart.push({name: p.name, size: p.selectedSize, price: p.currentPrice, image: p.image}); this.cartOpen = true; },
                getTotal() { return this.cart.reduce((s, i) => s + parseInt(i.price), 0); },
                sendWhatsApp() {
                    const phone = "212600000000"; 
                    let msg = "*Commande Prestige*%0A";
                    this.cart.forEach(i => msg += `• ${i.name} (${i.size}) : ${i.price}DH%0A`);
                    msg += `%0A*TOTAL : ${this.getTotal()} DH*`;
                    window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
                }
            }
        }
    </script>
</body>
</html>
